services:
  llama-server:
    image: ghcr.io/ggerganov/llama.cpp:server
    volumes:
      - ./models:/models:ro
    command: >
      -m /models/${MODEL_FILE:-model.gguf}
      --host 0.0.0.0
      --port 8080
      --ctx-size 4096
      --n-predict 1024
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - llama-server
    restart: unless-stopped
