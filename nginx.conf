server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /v1/* to llama-server — mirrors the Vite dev proxy
    location /v1/ {
        proxy_pass http://llama-server:8080/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Required for SSE streaming — disabling buffering lets tokens reach the
        # browser as they arrive instead of batching until the response ends.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Proxy /ollama/* to Ollama service — mirrors the Vite dev proxy
    location /ollama/ {
        proxy_pass http://ollama:11434/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # SPA fallback — all client-side routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
